<div class="message-input-container" style="height: 32px">
  <div>
    <div class="message-input-container-area">
      <div class="mode-select">
        <span style="cursor: pointer" class="ant-dropdown-trigger"
          ><div class="mode-select-open" style="opacity: 1; cursor: pointer">
            <div
              id="notification_update_popover_mode_select"
              class="mode-select-open-mode-select"
            ></div>
            <span role="img" class="anticon"
              ><svg
                width="1em"
                height="1em"
                fill="currentColor"
                aria-hidden="true"
                focusable="false"
                class=""
              >
                <use xlink:href="#icon-line-plus-01"></use></svg
            ></span></div></span
        ><input
          type="file"
          id="filesUpload"
          multiple=""
          style="display: none"
        />
      </div>
      <textarea
        rows="1"
        class="message-input-textarea"
        placeholder="How can I help you today?"
        style="height: 32px; overflow-y: hidden"
        data-spm-anchor-id="a2ty_o01.29997169.0.i0.3d4d55fbQAsvjP"
      ></textarea>
      <div class="message-input-right-button">
        <div class="qwen-thinking-selector">
          <div
            class="ant-select ant-select-outlined qwen-select-thinking qwen-select-none css-mncuj7 ant-select-single"
            style="opacity: 1; cursor: pointer"
          >
            <div class="ant-select-selector">
              <span class="ant-select-selection-wrap"
                ><span class="ant-select-selection-search"
                  ><input
                    type="search"
                    autocomplete="off"
                    class="ant-select-selection-search-input"
                    role="combobox"
                    aria-expanded="false"
                    aria-haspopup="listbox"
                    aria-owns="rc_select_0_list"
                    aria-autocomplete="list"
                    aria-controls="rc_select_0_list"
                    readonly=""
                    unselectable="on"
                    style="opacity: 0"
                    value=""
                    id="rc_select_0" /></span
                ><span class="ant-select-selection-item"
                  ><div class="qwen-select-thinking-label">
                    <span class="qwen-select-thinking-label-text">Auto</span>
                    <div class="icon-web-ui qwen-select-thinking-label-icon">
                      <svg class="icon-svg" aria-hidden="true">
                        <use xlink:href="#icon-line-chevron-down"></use>
                      </svg>
                    </div></div></span
              ></span>
            </div>
          </div>
        </div>
        <div class="message-input-right-button-send">
          <div class="omni-button-content">
            <div
              class="ant-dropdown-trigger omni-button-content-btn"
              style="opacity: 1; cursor: pointer"
            >
              <span role="img" class="anticon omni-button-content-btn-icon"
                ><svg
                  width="1em"
                  height="1em"
                  fill="currentColor"
                  aria-hidden="true"
                  focusable="false"
                  class=""
                >
                  <use xlink:href="#icon-line-waveform"></use></svg
              ></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
