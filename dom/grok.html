<form
  class="w-full text-base flex flex-col gap-2 items-center justify-center relative z-10 mt-0"
>
  <div
    class="flex flex-col gap-0 justify-center w-full relative items-center @xl:w-4/5"
  >
    <input class="hidden" multiple="" type="file" name="files" />
    <div
      class="query-bar group z-20 relative w-full overflow-hidden @container/input pb-0 bg-surface-l1 ring-1 ring-inset ring-border-l1 focus-within:ring-1 hover:ring-border-l1 focus-within:ring-border-l1 hover:focus-within:ring-border-l1 transition-[border-radius] duration-200 ease-in-out rounded-t-[var(--border-t-radius)] rounded-b-[var(--border-b-radius)] max-w-breakout shadow-sm shadow-black/5"
      style="
        transition-property: background-color, box-shadow, border-color;
        transition-duration: 100ms;
        transition-timing-function: ease-in-out;
        --border-t-radius: 10rem;
        --border-b-radius: 10rem;
      "
    >
      <div class="w-full ps-4 pe-2">
        <div
          role="list"
          aria-label="Conversation attachments"
          class="w-full flex-row gap-2 mt-3 px-1 whitespace-nowrap hidden flex-wrap will-change-[mask-image] @sm:[mask-image:none] [mask-image:linear-gradient(to_right,transparent_0,black_0px,black_calc(100%_-_40px),transparent_100%)]"
          style="opacity: 1; transform: none"
        ></div>
      </div>
      <div
        class="transition-[padding] duration-300 ease-out ps-11 pe-20"
        style="padding-inline-end: 125.188px"
      >
        <div class="relative z-10 transition-[padding] duration-300 ease-out">
          <div class="relative min-h-[60px]" data-testid="chat-input">
            <div dir="auto">
              <div
                contenteditable="true"
                role="textbox"
                aria-label="Ask Grok anything"
                aria-multiline="true"
                aria-disabled="false"
                translate="no"
                class="tiptap ProseMirror w-full px-2 bg-transparent focus:outline-none text-primary align-bottom max-h-[400px] overflow-y-auto !max-w-none prose [&amp;_ul&gt;li&gt;p]:my-0 [&amp;_ol&gt;li&gt;p]:my-0 [&amp;_li&gt;ol]:my-0 [&amp;_li&gt;ul]:my-0 [&amp;_p]:my-0 [&amp;_ul]:my-0 [&amp;_ol]:my-0 pt-4 my-0 scroll-feather-y"
                tabindex="0"
              >
                <p data-placeholder="" class="is-empty is-editor-empty">
                  <br class="ProseMirror-trailingBreak" />
                </p>
              </div>
            </div>
            <div
              class="absolute inset-0 pointer-events-none overflow-hidden flex items-start px-2 my-0 scroll-feather-y pt-[1.125rem]"
            >
              <span
                class="inline-flex items-center gap-1.5 text-secondary whitespace-nowrap"
                style="opacity: 1; transform: none"
                >What's on your mind?</span
              >
            </div>
          </div>
        </div>
        <div
          class="flex absolute inset-x-0 bottom-0 border-2 border-transparent max-w-full p-2"
        >
          <div class="grow flex items-center gap-1.5">
            <div class="flex items-center">
              <button
                class="inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium leading-[normal] cursor-pointer focus-visible:outline-none focus-visible:ring-1 disabled:opacity-60 disabled:cursor-not-allowed transition-colors duration-100 [&amp;_svg]:shrink-0 select-none text-fg-primary hover:bg-button-ghost-hover disabled:hover:bg-transparent border border-transparent h-10 w-10 rounded-full group/attach-button focus-visible:ring-ring focus-visible:ring-offset-1 focus-visible:ring-offset-background"
                type="button"
                aria-label="Attach"
                data-testid="attach-button"
                tabindex="0"
                id="radix-_r_1o_"
                aria-haspopup="menu"
                aria-expanded="false"
                data-state="closed"
              >
                <span
                  class="flex items-center justify-center text-primary"
                  style="transform: none"
                  ><svg
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    class="stroke-[2]"
                  >
                    <path
                      d="M6 12H18M12 6V18"
                      stroke="currentColor"
                      stroke-linecap="square"
                    ></path></svg
                ></span>
              </button>
            </div>
            <div class="ms-auto flex flex-row items-end gap-1">
              <div
                class="relative z-20"
                data-query-bar-mode-select="true"
                style="opacity: 1; filter: blur(0px)"
              >
                <button
                  class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium cursor-pointer focus-visible:outline-none focus-visible:ring-1 disabled:opacity-60 disabled:cursor-not-allowed transition-colors duration-100 [&amp;_svg]:shrink-0 select-none hover:bg-button-ghost-hover disabled:hover:bg-transparent border border-transparent h-10 px-3.5 py-1.5 text-sm rounded-full text-primary focus:outline-none aria-expanded:bg-button-ghost-hover pe-2 focus-visible:ring-ring focus-visible:ring-offset-1 focus-visible:ring-offset-background"
                  type="button"
                  id="model-select-trigger"
                  aria-label="Model select"
                  aria-haspopup="menu"
                  aria-expanded="false"
                  data-state="closed"
                >
                  <span class="flex items-center gap-1 overflow-hidden"
                    ><span class="truncate text-sm font-semibold"
                      >Fast</span
                    ></span
                  ><span class="flex items-center gap-1 overflow-hidden"
                    ><svg
                      viewBox="0 0 16 16"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="size-4 text-secondary"
                      aria-hidden="true"
                    >
                      <polyline points="4,6 8,10 12,6"></polyline></svg
                  ></span>
                </button>
              </div>
              <div style="opacity: 1; filter: blur(0px)">
                <button
                  class="group flex flex-col justify-center rounded-full focus:outline-none focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring focus-visible:ring-offset-1 focus-visible:ring-offset-background"
                  type="submit"
                  aria-label="Submit"
                  data-testid="chat-submit"
                  disabled=""
                >
                  <div
                    class="h-10 relative aspect-square flex flex-col items-center justify-center rounded-full ring-inset before:absolute before:inset-0 before:rounded-full before:bg-button-filled before:ring-0 before:transition-[clip-path,background-color] before:duration-150 before:ease-out bg-warm-gray-100 dark:bg-gray-600 text-fg-secondary before:[clip-path:circle(0%_at_50%_50%)] ring-0"
                  >
                    <svg
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                      class="stroke-[2] relative"
                    >
                      <path
                        d="M6 11L12 5M12 5L18 11M12 5V19"
                        stroke="currentColor"
                        stroke-linecap="square"
                      ></path>
                    </svg>
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
